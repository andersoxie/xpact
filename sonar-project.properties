# SonarQube project configuration for xpact.
sonar.projectKey=xpact
sonar.projectName=xpact
sonar.projectVersion=1.0

sonar.sourceEncoding=UTF-8
sonar.sources=.
sonar.tests=tests
sonar.test.inclusions=tests/**/*.e,tests/**/*.c,tests/**/*.h,tests/**/*.ps1

sonar.exclusions=EIFGENs/**,build/**,dist/**,.git/**,.tmp/**,coverage/**,tests/**,**/*.obj,exception_trace.log
